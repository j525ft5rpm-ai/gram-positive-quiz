"产气荚膜梭菌"}, {"key": "C", "text": "肉毒梭菌"}, {"key": "D", "text": "炭疽芽胞杆菌"}, {"key": "E", "text": "白喉棒状杆菌"}], "answer": "B"}];
    let answered = {};
    let wrongIds = new Set();
    let history = [];
    let current = null;

    const $ = id => document.getElementById(id);
    const pages = ["start-page", "quiz-page", "history-page", "complete-page"];

    function show(id) {
      pages.forEach(pageId => $(pageId).classList.toggle("active", pageId === id));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function reset() {
      answered = {};
      wrongIds = new Set();
      history = [];
      current = null;
      QUESTIONS.forEach(q => answered[q.id] = false);
      save();
      updateProgress();
    }

    function save() {
      localStorage.setItem("gram_positive_quiz_state", JSON.stringify({
        answered,
        wrongIds: Array.from(wrongIds),
        history
      }));
    }

    function restore() {
      const raw = localStorage.getItem("gram_positive_quiz_state");
      if (!raw) return reset();
      try {
        const state = JSON.parse(raw);
        answered = state.answered || {};
        wrongIds = new Set(state.wrongIds || []);
        history = state.history || [];
        QUESTIONS.forEach(q => {
          if (answered[q.id] === undefined) answered[q.id] = false;
        });
      } catch {
        reset();
      }
      updateProgress();
    }

    function updateProgress() {
      const total = QUESTIONS.length;
      const done = Object.values(answered).filter(Boolean).length;
      $("progress-text").textContent = `${done} / ${total}`;
      $("progress-bar").style.width = total ? `${done / total * 100}%` : "0%";
      $("total-count").textContent = total;
    }

    function nextQuestion() {
      const remaining = QUESTIONS.filter(q => !answered[q.id]);
      if (!remaining.length) return complete();

      const wrongRemaining = remaining.filter(q => wrongIds.has(q.id));
      const pool = wrongRemaining.length ? wrongRemaining : remaining;
      current = pool[Math.floor(Math.random() * pool.length)];

      $("question-text").textContent = `${current.id}. ${current.question}`;
      $("retry-badge").classList.toggle("hidden", !wrongIds.has(current.id));
      $("options").innerHTML = "";

      current.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.type = "button";
        btn.dataset.key = opt.key;
        btn.innerHTML = `<strong>${opt.key}.</strong>${opt.text}`;
        btn.addEventListener("click", choose);
        $("options").appendChild(btn);
      });

      updateProgress();
    }

    function choose(event) {
      const btn = event.target.closest("button");
      if (!btn || !current) return;

      const userAnswer = btn.dataset.key;
      const correctAnswer = current.answer;
      const isCorrect = userAnswer === correctAnswer;

      document.querySelectorAll(".option").forEach(option => {
        option.disabled = true;
        if (option.dataset.key === correctAnswer) option.classList.add("correct");
        if (option.dataset.key === userAnswer && !isCorrect) option.classList.add("wrong");
      });

      history.push({
        id: current.id,
        question: current.question,
        options: current.options,
        userAnswer,
        correctAnswer,
        isCorrect
      });

      if (isCorrect) {
        answered[current.id] = true;
        wrongIds.delete(current.id);
      } else {
        wrongIds.add(current.id);
      }

      save();
      setTimeout(nextQuestion, 850);
    }

    function renderHistory() {
      const list = $("history-list");
      if (!history.length) {
        list.innerHTML = `<div class="empty">暂无答题记录</div>`;
        return;
      }
      list.innerHTML = history.map((item, index) => {
        const options = item.options.map(opt => {
          let cls = "history-option";
          let tag = "";
          if (opt.key === item.correctAnswer) {
            cls += " correct";
            tag = opt.key === item.userAnswer ? "（你的选择，正确）" : "（正确答案）";
          } else if (opt.key === item.userAnswer) {
            cls += " wrong";
            tag = "（你的选择）";
          }
          return `<div class="${cls}">${opt.key}. ${opt.text} ${tag}</div>`;
        }).join("");
        return `<article class="history-item ${item.isCorrect ? "correct" : "wrong"}"><h3>${index + 1}. ${item.question}</h3>${options}</article>`;
      }).join("");
    }

    function complete() {
      const wrong = history.filter(item => !item.isCorrect).length;
      $("complete-summary").textContent = `你已完成 ${QUESTIONS.length} 道题，共作答 ${history.length} 次，答错 ${wrong} 次。`;
      show("complete-page");
    }

    $("start-btn").addEventListener("click", () => { show("quiz-page"); nextQuestion(); });
    $("restart-btn").addEventListener("click", () => { reset(); show("quiz-page"); nextQuestion(); });
    $("restart-history-btn").addEventListener("click", () => { reset(); show("quiz-page"); nextQuestion(); });
    $("complete-restart-btn").addEventListener("click", () => { reset(); show("quiz-page"); nextQuestion(); });
    $("history-btn").addEventListener("click", () => { renderHistory(); show("history-page"); });
    $("complete-history-btn").addEventListener("click", () => { renderHistory(); show("history-page"); });
    $("back-btn").addEventListener("click", () => { show("quiz-page"); });

    restore();
  </script>
</body>
</html>
